<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台3 — 抽獎管理 (完全修正版)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(212,168,67,0.15);
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --red: #c0272d;
    --red-light: #e8474e;
    --text: #e8e0d0;
    --text-muted: rgba(232,224,208,0.45);
    --green: #4caf50;
    --orange: #ffb74d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 900; color: var(--gold); letter-spacing: 0.2em; margin-right: 32px; white-space: nowrap; }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { padding: 8px 16px; border-radius: 4px; color: var(--text-muted); text-decoration: none; font-size: 1.275rem; transition: all 0.2s; white-space: nowrap; }
  .nav-link:hover { color: var(--text); background: var(--surface2); }
  .nav-link.active { color: var(--gold); background: rgba(212,168,67,0.08); }

  .main { padding: 32px; max-width: 1100px; margin: 0 auto; }
  .page-title { font-family: 'Noto Serif TC', serif; font-size: 2.25rem; font-weight: 900; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 4px; }
  .page-subtitle { color: var(--text-muted); font-size: 1.275rem; margin-bottom: 32px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px; margin-bottom: 20px; }
  .panel-title { font-size: 1.2rem; color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 1.2rem; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 8px; }
  .form-input, .form-select {
    width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px; padding: 10px 14px; color: var(--text);
    font-family: 'Noto Sans TC', sans-serif; font-size: 1.35rem; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--gold); }

  .row-inline { display: grid; grid-template-columns: 1fr 90px; gap: 10px; align-items: end; }

  .btn { padding: 10px 20px; border-radius: 4px; border: none; font-family: 'Noto Sans TC', sans-serif; font-size: 1.275rem; cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s; white-space: nowrap; }
  .btn-gold { background: linear-gradient(135deg, #a07820, var(--gold)); color: #1a0a00; font-weight: 500; }
  .btn-gold:hover { filter: brightness(1.1); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: transparent; border: 1px solid rgba(192,39,45,0.3); color: #e57373; }
  .btn-red-solid { background: linear-gradient(135deg, #8b1a1e, var(--red)); color: #fff; font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 600; letter-spacing: 0.2em; }
  .btn-red-solid:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-sm { padding: 6px 12px; font-size: 1.17rem; }

  .upload-zone { border: 2px dashed rgba(212,168,67,0.25); border-radius: 6px; padding: 28px 20px; text-align: center; cursor: pointer; position: relative; }
  .upload-icon { font-size: 3rem; margin-bottom: 8px; }

  .map-panel { background: var(--surface2); border: 1px solid rgba(212,168,67,0.1); border-radius: 6px; padding: 16px; margin-top: 14px; display: none; }
  .map-panel.show { display: block; }

  .personnel-stats { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .stat-chip { padding: 5px 14px; background: rgba(212,168,67,0.08); border: 1px solid rgba(212,168,67,0.15); border-radius: 20px; font-size: 1.2rem; color: var(--gold); }
  .stat-chip.excluded { background: rgba(192,39,45,0.08); border-color: rgba(192,39,45,0.2); color: #e57373; }

  .prize-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .prize-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface2); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; }
  .prize-item.drawn { border-color: rgba(192,39,45,0.2); background: rgba(192,39,45,0.05); }
  .prize-name { flex: 1; font-size: 1.35rem; }
  .prize-count { font-size: 1.17rem; color: var(--gold); font-weight: 500; }
  .prize-drawn-badge { font-size: 1.08rem; color: #e57373; background: rgba(192,39,45,0.12); padding: 2px 8px; border-radius: 10px; }
  .prize-delete-btn { background: transparent; border: none; color: rgba(192,39,45,0.45); cursor: pointer; font-size: 1.275rem; }

  .info-box { padding: 12px 16px; background: rgba(212,168,67,0.05); border: 1px solid rgba(212,168,67,0.1); border-radius: 4px; margin-bottom: 16px; display: none; }
  .info-box.show { display: block; }

  .result-preview { background: var(--surface2); border: 1px solid rgba(212,168,67,0.1); border-radius: 6px; padding: 16px; margin-top: 14px; display: none; }
  .result-preview.show { display: block; }
  .result-winner-chip { padding: 5px 12px; background: rgba(192,39,45,0.15); border: 1px solid rgba(192,39,45,0.2); border-radius: 20px; margin: 4px; display: inline-block; }

  .history-item { padding: 12px 16px; background: var(--surface2); border-radius: 4px; border-left: 3px solid var(--gold); margin-bottom: 8px; }
  .history-prize { font-size: 1.35rem; color: var(--gold); }
  .history-winners { font-size: 1.23rem; color: var(--text-muted); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 20px; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  .empty-msg { color: var(--text-muted); padding: 20px; text-align: center; }

  .prize-item-actions { display: flex; gap: 8px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">🏮 春酒後台</div>
  <div class="nav-links">
    <a href="admin-1-registrations.html" class="nav-link">報名名單</a>
    <a href="admin-2-redpacket.html" class="nav-link">紅包雨</a>
    <a href="admin-3-lottery.html" class="nav-link active">抽獎管理</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">抽獎管理</div>
  <div class="page-subtitle">中獎過的人不會再被抽中。</div>

  <div class="grid-2">
    <div>
      <div class="panel">
        <div class="panel-title">人員名單匯入</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="onFileSelect(event)">
          <div class="upload-icon">📂</div>
          <div class="upload-label">點擊或拖曳 Excel 到此</div>
        </div>

        <div class="map-panel" id="mapPanel">
          <div class="map-row">
            <div><label class="map-label">姓名</label><select class="map-select" id="colName"></select></div>
            <div><label class="map-label">單位</label><select class="map-select" id="colUnit"></select></div>
          </div>
          <button class="btn btn-gold" style="width:100%;margin-top:10px" onclick="confirmImport()">確認匯入</button>
        </div>

        <div id="personnelStats" style="display:none">
          <div class="personnel-stats">
            <div class="stat-chip" id="statAvailable"></div>
            <div class="stat-chip excluded" id="statExcluded" style="display:none"></div>
            <button class="btn btn-outline btn-sm" onclick="resetLotteryStatus()" style="margin-left:auto; color: var(--orange); border-color: rgba(255,183,77,0.3)">重置抽獎狀態</button>
            <button class="btn btn-danger btn-sm" onclick="clearPersonnel()">清除</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">
          獎品設定
          <button class="btn btn-danger btn-sm" id="clearAllPrizesBtn" onclick="clearAllPrizes()" style="display:none">清除全部</button>
        </div>
        <div class="row-inline">
          <div class="form-group"><label class="form-label">獎項名稱</label><input type="text" class="form-input" id="prizeName"></div>
          <div class="form-group"><label class="form-label">人數</label><input type="number" class="form-input" id="prizeCount" value="1"></div>
        </div>
        <button class="btn btn-gold" style="width:100%;margin-top:10px" onclick="addPrize()">＋ 新增獎項</button>
        <div style="margin-top:20px" class="prize-list" id="prizeList"></div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-title">抽獎操作</div>
        <div id="resetWarning" style="display:none;padding:10px;background:rgba(192,39,45,0.1);color:#ff8a80;margin-bottom:10px;border-radius:4px">⚠️ 請先重置前台畫面</div>
        <div class="form-group">
          <select class="form-select" id="prizeSelect" onchange="refreshAllUI()"></select>
        </div>
        <div class="info-box" id="infoBox">可抽：<span id="poolCount"></span> 人 / 抽出：<span id="selectedCountText"></span> 位</div>
        <div class="result-preview" id="resultPreview"><div id="previewWinners"></div></div>
        <div style="margin-top:16px;display:flex;gap:10px">
          <button class="btn btn-outline" style="flex:1" id="btnPreview" onclick="previewDraw()" disabled>預覽</button>
          <button class="btn btn-red-solid" style="flex:2" id="btnDraw" onclick="startDraw()" disabled>▶ 開始抽獎</button>
        </div>
      </div>

      <div class="panel">
        <button class="btn btn-outline" style="width:100%" onclick="resetFrontend()">重置前台至空白</button>
      </div>

      <div class="panel">
        <div class="panel-title">抽獎紀錄 <button class="btn btn-danger btn-sm" onclick="clearHistory()">清除</button></div>
        <div id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCNFt387HP9NZdoIx517GcfUO5RFHdmtMA",
    authDomain: "springfestival-4aaea.firebaseapp.com",
    projectId: "springfestival-4aaea",
    databaseURL: "https://springfestival-4aaea-default-rtdb.firebaseio.com",
    storageBucket: "springfestival-4aaea.firebasestorage.app",
    messagingSenderId: "64196762294",
    appId: "1:64196762294:web:2fb6e766f38f8d47332417"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let prizes = [], personnel = [], winners = [], drawHistory = [], needsReset = false, pendingResult = null;
  let rawSheet = [], rawHeaders = [];

  onValue(ref(db, 'lottery_data'), (snapshot) => {
    if (snapshot.exists()) {
      const data = snapshot.val();
      prizes = data.prizes || [];
      personnel = data.personnel || [];
      winners = data.winners || [];
      drawHistory = data.drawHistory || [];
      needsReset = data.needsReset || false;
    }
    refreshAllUI();
  });

  function syncToFirebase() {
    set(ref(db, 'lottery_data'), { prizes, personnel, winners, drawHistory, needsReset });
  }

  window.resetLotteryStatus = function() {
    if (!confirm('確定要強制重置抽獎狀態嗎？(所有人恢復可抽獎)')) return;
    winners = [];
    drawHistory = [];
    prizes = prizes.map(p => ({ ...p, drawn: false }));
    needsReset = false;
    syncToFirebase();
    set(ref(db, 'lottery_control'), { status: 'reset', timestamp: Date.now() });
    showToast('✓ 已成功重置排除名單！');
  };

  window.onFileSelect = e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        rawHeaders = rows[0].map((h, i) => String(h).trim() || `欄${i+1}`);
        rawSheet = rows.slice(1);
        document.getElementById('colName').innerHTML = rawHeaders.map((h,i) => `<option value="${i}">${h}</option>`).join('');
        document.getElementById('colUnit').innerHTML = rawHeaders.map((h,i) => `<option value="${i}">${h}</option>`).join('');
        document.getElementById('mapPanel').classList.add('show');
      };
      reader.readAsArrayBuffer(file);
    }
  };

  window.confirmImport = () => {
    const ni = parseInt(document.getElementById('colName').value);
    const ui = parseInt(document.getElementById('colUnit').value);
    personnel = rawSheet.map(r => ({ realName: String(r[ni]||'').trim(), unitName: String(r[ui]||'').trim() })).filter(p => p.realName);
    document.getElementById('mapPanel').classList.remove('show');
    syncToFirebase();
  };

  window.addPrize = () => {
    const name = document.getElementById('prizeName').value.trim();
    const count = parseInt(document.getElementById('prizeCount').value) || 1;
    if(!name) {
      showToast('請輸入獎項名稱');
      return;
    }
    prizes.push({ id: Date.now(), name, count, drawn: false, order: prizes.length + 1 });
    syncToFirebase();
    document.getElementById('prizeName').value = '';
    document.getElementById('prizeCount').value = '1';
    showToast('✓ 獎項已新增');
  };

  window.deletePrize = (id) => {
    prizes = prizes.filter(p => p.id !== id);
    syncToFirebase();
    showToast('✓ 獎項已刪除');
  };

  window.clearAllPrizes = () => {
    if (!confirm('確定要清除所有獎項嗎？')) return;
    prizes = [];
    syncToFirebase();
    showToast('✓ 所有獎項已清除');
  };

  function getAvailablePool() {
    return personnel.filter(p => !winners.some(w => w.realName === p.realName && w.unitName === p.unitName));
  }

  window.previewDraw = () => {
    const prize = prizes.find(p => p.id == document.getElementById('prizeSelect').value);
    const pool = getAvailablePool();
    if(!pool.length) {
      showToast('無人可抽');
      return;
    }
    pendingResult = { prize, winners: [...pool].sort(() => Math.random() - 0.5).slice(0, Math.min(prize.count, pool.length)) };
    document.getElementById('previewWinners').innerHTML = pendingResult.winners.map(w => `<div class="result-winner-chip">${w.realName}</div>`).join('');
    document.getElementById('resultPreview').classList.add('show');
  };

  window.startDraw = () => {
    if(!pendingResult) {
      showToast('請先預覽');
      return;
    }
    const { prize, winners: newWinners } = pendingResult;
    set(ref(db, 'lottery_control'), { status: 'start', prizeName: prize.name, winners: newWinners, timestamp: Date.now() });
    prizes = prizes.map(p => p.id == prize.id ? { ...p, drawn: true } : p);
    winners = [...winners, ...newWinners];
    drawHistory.unshift({ time: new Date().toLocaleTimeString(), prizeName: prize.name, winners: newWinners.map(w => w.realName).join(', ') });
    needsReset = true;
    pendingResult = null;
    document.getElementById('resultPreview').classList.remove('show');
    syncToFirebase();
    showToast('✓ 抽獎已開始！');
  };

  window.resetFrontend = () => {
    set(ref(db, 'lottery_control'), { status: 'reset', timestamp: Date.now() });
    needsReset = false;
    syncToFirebase();
    showToast('✓ 前台已重置');
  };

  window.clearPersonnel = () => { if(confirm('確定清除？')) { personnel = []; winners = []; syncToFirebase(); showToast('✓ 人員已清除'); } };
  window.clearHistory = () => { if(confirm('清除紀錄？')) { drawHistory = []; syncToFirebase(); showToast('✓ 紀錄已清除'); } };

  function refreshAllUI() {
    const sel = document.getElementById('prizeSelect');
    const curValue = sel.value;
    // 【修正1】獎項下拉選單正確顯示人數
    sel.innerHTML = '<option value="">— 請選擇獎項 —</option>' + prizes.map(p => {
      const disabled = p.drawn ? 'disabled' : '';
      const label = `${p.name} (${p.count}人)${p.drawn ? ' ✓ 已抽' : ''}`;
      return `<option value="${p.id}" ${disabled}>${label}</option>`;
    }).join('');
    sel.value = curValue;

    // 【修正3】清除獎項按鈕的顯示邏輯
    const clearBtn = document.getElementById('clearAllPrizesBtn');
    clearBtn.style.display = prizes.length > 0 ? 'block' : 'none';

    document.getElementById('prizeList').innerHTML = prizes.map(p => `
      <div class="prize-item ${p.drawn?'drawn':''}">
        <div class="prize-name">${p.name}</div>
        <div class="prize-count">${p.count} 人</div>
        ${p.drawn?'<div class="prize-drawn-badge">已抽出</div>':''}
        <button class="prize-delete-btn" onclick="deletePrize(${p.id})">🗑</button>
      </div>
    `).join('') || '<div class="empty-msg">尚未新增獎項</div>';

    const pool = getAvailablePool();
    document.getElementById('personnelStats').style.display = personnel.length ? 'block' : 'none';
    document.getElementById('statAvailable').textContent = `可抽：${pool.length} 人`;
    const excludedCount = personnel.length - pool.length;
    const statExcluded = document.getElementById('statExcluded');
    statExcluded.style.display = excludedCount > 0 ? 'inline-block' : 'none';
    statExcluded.textContent = `排除：${excludedCount} 人`;

    document.getElementById('historyList').innerHTML = drawHistory.map(h => `<div class="history-item"><div class="history-prize">${h.prizeName}</div><div class="history-winners">${h.winners}</div></div>`).join('') || '<div class="empty-msg">尚無紀錄</div>';
    
    document.getElementById('resetWarning').style.display = needsReset ? 'block' : 'none';
    const selectedPrize = prizes.find(p => p.id == sel.value);
    
    // 【修正2】修正按鈕啟用邏輯 - needsReset 不應該禁用按鈕，只是顯示警告
    const canDraw = selectedPrize && !selectedPrize.drawn && pool.length > 0;
    document.getElementById('btnDraw').disabled = !canDraw;
    document.getElementById('btnPreview').disabled = !canDraw;

    if (selectedPrize && !selectedPrize.drawn) {
      document.getElementById('infoBox').classList.add('show');
      document.getElementById('poolCount').textContent = pool.length;
      document.getElementById('selectedCountText').textContent = Math.min(selectedPrize.count, pool.length);
    } else {
      document.getElementById('infoBox').classList.remove('show');
    }
  }

  function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
</script>
</body>
</html>
