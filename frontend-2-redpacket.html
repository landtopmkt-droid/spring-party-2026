<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жҳҘй…’жҙ»еӢ• вҖ” зҙ…еҢ…йӣЁ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* зӯүеҫ…й»һж“Ҡи§ЈйҺ–иҮӘеӢ•ж’ӯж”ҫзҡ„жҸҗзӨәпјҲOBS дёҚйңҖиҰҒпјҢдёҖиҲ¬зҖҸиҰҪеҷЁйңҖиҰҒпјү */
  #unlockOverlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
  }
  #unlockOverlay.hidden { display: none; }
  #unlockOverlay .unlock-icon { font-size: 5rem; }
  #unlockOverlay .unlock-text {
    color: #d4a843;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
  }

  #bgVideo {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #bgVideo.visible { display: block; opacity: 1; }

  #rainContainer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: none;
  }

  .red-packet {
    position: absolute;
    top: -80px;
    animation: rainDrop linear infinite;
    pointer-events: none;
    user-select: none;
  }
  @keyframes rainDrop {
    0%   { transform: translateY(0) rotate(-15deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- й»һж“Ҡи§ЈйҺ–пјҲйҰ–ж¬Ўдә’еӢ•и®“зҖҸиҰҪеҷЁе…ҒиЁұиҮӘеӢ•ж’ӯж”ҫпјӣOBS дёҚйЎҜзӨәжӯӨеұӨпјү -->
<div id="unlockOverlay" onclick="unlockAutoplay()">
  <div class="unlock-icon">рҹҸ®</div>
  <div class="unlock-text">й»һж“Ҡз•«йқўд»Ҙе•ҹеӢ•</div>
</div>

<video id="bgVideo" loop muted playsinline>
  <source src="redpacket-bg.mp4" type="video/mp4">
</video>

<div id="rainContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCNFt387HP9NZdoIx517GcfUO5RFHdmtMA",
    authDomain:        "springfestival-4aaea.firebaseapp.com",
    projectId:         "springfestival-4aaea",
    databaseURL:       "https://springfestival-4aaea-default-rtdb.firebaseio.com",
    storageBucket:     "springfestival-4aaea.firebasestorage.app",
    messagingSenderId: "64196762294",
    appId:             "1:64196762294:web:2fb6e766f38f8d47332417",
    measurementId:     "G-4MZF0HPLJV"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let rainActive    = false;
  let rainInterval  = null;
  let unlocked      = false;

  // в”Җв”Җ иЁҳйҢ„й Ғйқўй–Ӣе•ҹжҷӮй–“пјҢеҝҪз•ҘжҜ”йҖҷеҖӢжҷӮй–“жӣҙж—©зҡ„иҲҠжҢҮд»Ө в”Җв”Җ
  const pageOpenTime = Date.now();

  // в”Җв”Җ еҫ…иҷ•зҗҶзҡ„жҢҮд»ӨпјҲunlock еүҚжҡ«еӯҳпјүв”Җв”Җ
  let pendingAction = null;

  const video        = document.getElementById('bgVideo');
  const rainContainer = document.getElementById('rainContainer');
  const overlay      = document.getElementById('unlockOverlay');

  // в”Җв”Җ и§ЈйҺ–иҮӘеӢ•ж’ӯж”ҫ в”Җв”Җ
  window.unlockAutoplay = function() {
    unlocked = true;
    overlay.classList.add('hidden');

    // иӢҘ unlock еүҚе·Іж”¶еҲ°жҢҮд»ӨпјҢз«ӢеҚіеҹ·иЎҢ
    if (pendingAction === 'start') {
      startRain();
    } else if (pendingAction === 'stop') {
      stopRain();
    }
    pendingAction = null;
  };

  function createPacket() {
    const emojis = ['рҹ§§','рҹ§§','рҹ§§','рҹҺҠ','вңЁ','рҹҺҒ','рҹ§Ё'];
    const el = document.createElement('div');
    el.className = 'red-packet';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left   = (Math.random() * 100) + 'vw';
    const dur       = 2 + Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = (Math.random() * 0.8) + 's';
    el.style.fontSize = (1.6 + Math.random() * 2.4) + 'rem';
    rainContainer.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1) * 1000);
  }

  function startRain() {
    if (rainActive) return;
    rainActive = true;

    video.style.display = 'block';
    // зӯүдёҖеҖӢ frame еҶҚеҠ  visibleпјҲи§ёзҷј transitionпјү
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { video.classList.add('visible'); });
    });
    video.play().catch(e => console.warn('еҪұзүҮж’ӯж”ҫеӨұж•—пјҲз„ЎиҒІжҮүд»ҚеҸҜж’ӯпјү:', e));

    rainContainer.style.display = 'block';
    for (let i = 0; i < 25; i++) setTimeout(createPacket, i * 60);
    rainInterval = setInterval(() => {
      const n = 3 + Math.floor(Math.random() * 5);
      for (let i = 0; i < n; i++) setTimeout(createPacket, Math.random() * 700);
    }, 700);
  }

  function stopRain() {
    if (!rainActive) return;
    rainActive = false;
    clearInterval(rainInterval);
    rainInterval = null;

    // ж·ЎеҮә
    rainContainer.style.transition = 'opacity 1s ease';
    rainContainer.style.opacity = '0';
    video.classList.remove('visible');

    setTimeout(() => {
      rainContainer.style.display   = 'none';
      rainContainer.style.opacity   = '1';
      rainContainer.style.transition = '';
      rainContainer.innerHTML       = '';
      video.style.display = 'none';
      video.pause();
      video.currentTime = 0;
    }, 1000);
  }

  // в”Җв”Җ зӣЈиҒҪ Firebase жҢҮд»Ө в”Җв”Җ
  onValue(ref(db, 'redpacket_status'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    // вҳ… еҝҪз•Ҙй Ғйқўй–Ӣе•ҹеүҚзҡ„иҲҠжҢҮд»ӨпјҲйҒҝе…Қ OBS ијүе…ҘжҷӮйҮҚж’ӯиҲҠзӢҖж…Ӣпјү
    if (data.time && data.time < pageOpenTime) {
      console.log('еҝҪз•ҘиҲҠжҢҮд»ӨпјҲй–Ӣе•ҹеүҚе·ІеӯҳеңЁпјү:', data.action);
      return;
    }

    console.log('ж”¶еҲ°жҢҮд»Ө:', data.action);

    if (!unlocked) {
      // е°ҡжңӘи§ЈйҺ–пјҢе…Ҳжҡ«еӯҳ
      pendingAction = data.action;
      return;
    }

    if (data.action === 'start') startRain();
    else if (data.action === 'stop') stopRain();
  });
</script>
</body>
</html>
