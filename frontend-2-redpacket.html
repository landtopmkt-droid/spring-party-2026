<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春酒活動 — 紅包雨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #bgVideo {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    display: none;
  }

  #rainContainer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: none;
  }

  .red-packet {
    position: absolute;
    top: -80px;
    animation: rainDrop linear infinite;
    pointer-events: none;
  }
  @keyframes rainDrop {
    0%   { transform: translateY(0) rotate(-15deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
  }
</style>
</head>
<body>

<video id="bgVideo" loop muted playsinline>
  <source src="redpacket-bg.mp4" type="video/mp4">
</video>

<div id="rainContainer"></div>

<script>
  let rainActive = false;
  let rainInterval = null;

  const video         = document.getElementById('bgVideo');
  const rainContainer = document.getElementById('rainContainer');

  function createPacket() {
    const emojis = ['🧧','🧧','🧧','🎊','✨','🎁','🧨'];
    const el = document.createElement('div');
    el.className = 'red-packet';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + 'vw';
    const dur = 2 + Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay   = (Math.random() * 0.8) + 's';
    el.style.fontSize = (1.6 + Math.random() * 2.4) + 'rem';
    rainContainer.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1) * 1000);
  }

  function startRain() {
    if (rainActive) return;
    rainActive = true;
    video.style.display = 'block';
    video.play().catch(() => {});
    rainContainer.style.display = 'block';
    for (let i = 0; i < 25; i++) setTimeout(createPacket, i * 60);
    rainInterval = setInterval(() => {
      const n = 3 + Math.floor(Math.random() * 5);
      for (let i = 0; i < n; i++) setTimeout(createPacket, Math.random() * 700);
    }, 700);
  }

  function stopRain() {
    if (!rainActive) return;
    rainActive = false;
    clearInterval(rainInterval);
    rainContainer.style.transition = 'opacity 1s ease';
    rainContainer.style.opacity = '0';
    video.style.transition = 'opacity 1s ease';
    video.style.opacity = '0';
    setTimeout(() => {
      rainContainer.style.display = 'none';
      rainContainer.style.opacity = '1';
      rainContainer.style.transition = '';
      rainContainer.innerHTML = '';
      video.style.display = 'none';
      video.style.opacity = '1';
      video.style.transition = '';
      video.pause();
      video.currentTime = 0;
    }, 1000);
  }

  setInterval(() => {
    const ctrl = localStorage.getItem('springFest_redpacket');
    if      (ctrl === 'start' && !rainActive) startRain();
    else if (ctrl === 'stop'  &&  rainActive) stopRain();
  }, 500);
</script>
</body>
</html>
