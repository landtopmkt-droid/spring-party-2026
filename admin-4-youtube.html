<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台4 — YouTube 監控</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: rgba(212,168,67,0.15);
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --red: #c0272d;
    --red-light: #e8474e;
    --text: #e8e0d0;
    --text-muted: rgba(232,224,208,0.45);
    --green: #4caf50;
    --blue: #4a9eff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 900; color: var(--gold); letter-spacing: 0.2em; margin-right: 32px; white-space: nowrap; }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { padding: 8px 16px; border-radius: 4px; color: var(--text-muted); text-decoration: none; font-size: 1.275rem; transition: all 0.2s; white-space: nowrap; }
  .nav-link:hover { color: var(--text); background: var(--surface2); }
  .nav-link.active { color: var(--gold); background: rgba(212,168,67,0.08); }

  .main { padding: 32px; max-width: 1300px; margin: 0 auto; }
  .page-title { font-family: 'Noto Serif TC', serif; font-size: 2.25rem; font-weight: 900; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 4px; }
  .page-subtitle { color: var(--text-muted); font-size: 1.275rem; margin-bottom: 28px; }

  .setup-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px 28px; margin-bottom: 24px; }
  .setup-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .setup-group { flex: 1; min-width: 200px; }
  .form-label { display: block; font-size: 1.17rem; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 8px; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; padding: 10px 14px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 1.35rem; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--text-muted); font-size: 1.23rem; }

  .btn { padding: 10px 20px; border-radius: 4px; border: none; font-family: 'Noto Sans TC', sans-serif; font-size: 1.275rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-gold { background: linear-gradient(135deg, #a07820, var(--gold)); color: #1a0a00; font-weight: 500; }
  .btn-gold:hover { filter: brightness(1.1); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-red { background: linear-gradient(135deg, #8b1a1e, var(--red)); color: #fff; }
  .btn-red:hover { filter: brightness(1.1); }
  .btn-green { background: linear-gradient(135deg, #2e7d32, var(--green)); color: #fff; }
  .btn-green:hover { filter: brightness(1.1); }
  .btn-sm { padding: 7px 14px; font-size: 1.2rem; }

  .status-bar { display: flex; align-items: center; gap: 16px; padding: 10px 16px; background: var(--surface2); border-radius: 4px; margin-top: 12px; font-size: 1.23rem; flex-wrap: wrap; }
  .status-indicator { display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; }
  .dot.active { background: var(--green); animation: blink 1.2s infinite; }
  .dot.error { background: var(--red-light); }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab-btn { padding: 10px 20px; background: transparent; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-size: 1.32rem; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .count-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .count-info { font-size: 1.23rem; color: var(--text-muted); margin-left: auto; }
  .count-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; max-height: 500px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead { position: sticky; top: 0; z-index: 5; }
  thead tr { background: var(--surface2); }
  th { padding: 12px 16px; text-align: left; font-size: 1.125rem; color: var(--gold); letter-spacing: 0.15em; font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 1.32rem; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(212,168,67,0.02); }

  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 1.125rem; font-weight: 600; }
  .rank-1 { background: rgba(212,168,67,0.2); color: var(--gold-light); }
  .rank-2 { background: rgba(192,192,192,0.15); color: #c0c0c0; }
  .rank-3 { background: rgba(205,127,50,0.15); color: #cd7f32; }
  .rank-n { background: rgba(255,255,255,0.05); color: var(--text-muted); }

  .yt-name { color: var(--blue); font-size: 1.275rem; }
  .real-name { font-size: 1.35rem; }
  .unit-badge { display: inline-block; padding: 2px 8px; background: rgba(212,168,67,0.1); color: var(--gold); border-radius: 10px; font-size: 1.125rem; }
  .unmatched { color: var(--text-muted); font-style: italic; font-size: 1.23rem; }
  .count-num { font-size: 1.65rem; font-weight: 500; color: var(--text); }
  .last-time { font-size: 1.17rem; color: var(--text-muted); }

  .keyword-setup { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; }
  .keyword-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .keyword-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: rgba(192,39,45,0.15); border: 1px solid rgba(192,39,45,0.25); border-radius: 20px; font-size: 1.23rem; color: #ff8a80; }
  .keyword-chip button { background: none; border: none; color: currentColor; cursor: pointer; font-size: 1.275rem; padding: 0; line-height: 1; opacity: 0.6; }
  .keyword-chip button:hover { opacity: 1; }

  .kw-results-table { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; max-height: 500px; overflow-y: auto; }
  .keyword-highlight { background: rgba(192,39,45,0.2); color: #ff8a80; padding: 1px 4px; border-radius: 2px; font-weight: 500; }
  .msg-text { font-size: 1.275rem; color: var(--text); line-height: 1.5; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 3.75rem; margin-bottom: 10px; }

  .error-box { padding: 14px 18px; background: rgba(192,39,45,0.08); border: 1px solid rgba(192,39,45,0.25); border-radius: 6px; font-size: 1.275rem; color: #ff8a80; margin-top: 12px; display: none; }
  .error-box.show { display: block; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 20px; color: var(--text); font-size: 1.32rem; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 900px) {
    .nav { padding: 8px 16px; height: auto; flex-wrap: wrap; }
    .nav-brand { margin-right: 16px; font-size: 0.9rem; }
    .nav-link { padding: 6px 10px; font-size: 0.78rem; }
    .setup-row { flex-direction: column; }
    .setup-group { min-width: unset; width: 100%; }
  }
  @media (max-width: 600px) {
    .main { padding: 12px; }
    .nav { padding: 8px 12px; }
    .nav-links { flex-wrap: wrap; gap: 2px; }
    .nav-link { padding: 5px 8px; font-size: 0.72rem; }
    .page-title { font-size: 1.2rem; }
    .setup-panel { padding: 16px; }
    .status-bar { flex-direction: column; align-items: flex-start; gap: 6px; font-size: 0.78rem; }
    .tabs { overflow-x: auto; white-space: nowrap; padding-bottom: 4px; }
    .tab-btn { padding: 8px 14px; font-size: 0.8rem; }
    .count-toolbar { flex-direction: column; align-items: flex-start; gap: 8px; }
    .count-info { margin-left: 0; }
    .count-table-wrap, .kw-results-table { overflow-x: auto; }
    table { min-width: 560px; }
    .keyword-setup { padding: 14px; }
    .keyword-row { flex-direction: column; gap: 8px; }
    .keyword-chips { gap: 6px; }
    th, td { padding: 8px 10px; font-size: 0.78rem; }
  }
  @media (max-width: 400px) {
    .tab-btn { padding: 7px 10px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">🏮 春酒後台</div>
  <div class="nav-links">
    <a href="admin-1-registrations.html" class="nav-link">報名名單</a>
    <a href="admin-2-redpacket.html" class="nav-link">紅包雨</a>
    <a href="admin-3-lottery.html" class="nav-link">抽獎管理</a>
    <a href="admin-4-youtube.html" class="nav-link active">YT 監控</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">YouTube 直播監控</div>
  <div class="page-subtitle">即時追蹤留言數量與關鍵字，並自動比對報名資料</div>

  <div class="setup-panel">
    <div class="setup-row">
      <div class="setup-group" style="flex:2">
        <label class="form-label">YouTube 直播影片 ID 或網址</label>
        <input type="text" class="form-input" id="videoIdInput" placeholder="例：dQw4w9WgXcQ 或完整網址">
      </div>
      <button class="btn btn-green" id="btnStart" onclick="startMonitor()">開始監控</button>
      <button class="btn btn-red" id="btnStop" onclick="stopMonitor()" disabled>停止</button>
      <button class="btn btn-outline btn-sm" onclick="clearAllData()">清除資料</button>
    </div>
    <div class="status-bar">
      <div class="status-indicator">
        <div class="dot" id="statusDot"></div>
        <span id="statusText" style="color:var(--text-muted)">未啟動</span>
      </div>
      <span id="nextUpdateText" style="color:var(--text-muted)"></span>
      <span id="totalFetched" style="color:var(--text-muted)"></span>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('count')">📊 留言次數統計</button>
    <button class="tab-btn" onclick="switchTab('keyword')">🔍 關鍵字搜尋</button>
  </div>

  <div class="tab-content active" id="tab-count">
    <div class="count-toolbar">
      <button class="btn btn-outline btn-sm" onclick="sortBy('count')">依留言數排序</button>
      <button class="btn btn-outline btn-sm" onclick="sortBy('name')">依姓名排序</button>
      <button class="btn btn-outline btn-sm" onclick="exportCountCSV()">匯出 CSV</button>
      <span class="count-info" id="countInfo"></span>
    </div>
    <div class="count-table-wrap">
      <table>
        <thead><tr>
          <th style="width:48px">#</th>
          <th>YouTube 帳號</th>
          <th>本名</th>
          <th>單位</th>
          <th>留言次數</th>
          <th>最後留言時間</th>
        </tr></thead>
        <tbody id="countTableBody">
          <tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📡</div><div>請輸入直播 ID 並開始監控</div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="tab-content" id="tab-keyword">
    <div class="keyword-setup">
      <div class="keyword-row">
        <div style="flex:1;min-width:180px">
          <label class="form-label">新增關鍵字</label>
          <input type="text" class="form-input" id="kwInput" placeholder="例：紅包、春酒、恭喜..." onkeydown="if(event.key==='Enter')addKeyword()">
        </div>
        <button class="btn btn-gold" onclick="addKeyword()">新增</button>
        <button class="btn btn-red" onclick="searchKeywords()">🔍 搜尋</button>
      </div>
      <div class="keyword-chips" id="kwChips"></div>
    </div>

    <div class="kw-results-table">
      <table>
        <thead><tr>
          <th>時間戳記</th>
          <th>YouTube 帳號</th>
          <th>本名</th>
          <th>單位</th>
          <th>留言內容</th>
          <th>命中關鍵字</th>
        </tr></thead>
        <tbody id="kwTableBody">
          <tr><td colspan="6"><div class="empty-state"><div class="empty-icon">🔍</div><div>請設定關鍵字並按搜尋</div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCNFt387HP9NZdoIx517GcfUO5RFHdmtMA",
    authDomain: "springfestival-4aaea.firebaseapp.com",
    projectId: "springfestival-4aaea",
    databaseURL: "https://springfestival-4aaea-default-rtdb.firebaseio.com",
    storageBucket: "springfestival-4aaea.firebasestorage.app",
    messagingSenderId: "64196762294",
    appId: "1:64196762294:web:2fb6e766f38f8d47332417",
    measurementId: "G-4MZF0HPLJV"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const API_KEY = 'AIzaSyA_aSoMOEbfOtEY0gkTKajwFToB2MHQLXM';

  let liveChatId = null;
  let nextPageToken = null;
  let monitorInterval = null;
  let countdown = 60;
  let countdownInterval = null;
  let isRunning = false;
  let sortMode = 'count';

  // ── 全部改用記憶體變數，從 Firebase 載入/寫入，不碰 localStorage ──
  let allMessages = [];
  let userCounts = {};
  let keywords = [];
  let cloudRegistrations = [];

  // ── 初始化：從 Firebase 載入 YT 監控資料 ──
  async function loadYtData() {
    const snap = await get(ref(db, 'yt_monitor'));
    if (snap.exists()) {
      const d = snap.val();
      allMessages = d.allMessages || [];
      userCounts  = d.userCounts  || {};
      keywords    = d.keywords    || [];
    }
    renderCountTable();
    renderKeywordChips();
    document.getElementById('totalFetched').textContent =
      allMessages.length ? `已載入 ${allMessages.length} 則留言` : '';
  }

  // ── 寫回 Firebase ──
  function syncYtData() {
    // 避免留言太多：只保留最新 5000 筆
    if (allMessages.length > 5000) allMessages = allMessages.slice(-5000);
    set(ref(db, 'yt_monitor'), { allMessages, userCounts, keywords });
  }

  // ── 監聽雲端報名名單 ──
  onValue(ref(db, 'registrations'), (snapshot) => {
    const val = snapshot.val();
    cloudRegistrations = val ? Object.values(val) : [];
    renderCountTable();
  });

  // ── 身分比對 ──
  function matchUser(ytDisplayName) {
    if (!ytDisplayName) return null;
    const name = ytDisplayName.toLowerCase().replace('@','');
    return cloudRegistrations.find(d =>
      d.ytAccount && (
        d.ytAccount.toLowerCase() === name ||
        d.ytAccount.toLowerCase().replace('@','') === name
      )
    ) || null;
  }

  // ── YouTube 監控邏輯 ──
  window.startMonitor = async function() {
    const input = document.getElementById('videoIdInput').value;
    const videoId = extractVideoId(input);
    if (!videoId) { showError('無效的影片 ID 或網址'); return; }

    hideError();
    setStatus('connecting');

    try {
      liveChatId = await getLiveChatId(videoId);
      isRunning = true;
      setStatus('active');
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStop').disabled = false;

      await fetchMessages();
      startCountdown();
      monitorInterval = setInterval(async () => {
        await fetchMessages().catch(e => showError(e.message));
        resetCountdown();
      }, 60000);

      showToast('監控已啟動，每分鐘自動更新 ✓');
    } catch (e) {
      setStatus('error');
      showError(e.message);
    }
  };

  window.stopMonitor = function() {
    isRunning = false;
    clearInterval(monitorInterval);
    clearInterval(countdownInterval);
    monitorInterval = null;
    liveChatId = null;
    nextPageToken = null;
    setStatus('idle');
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('nextUpdateText').textContent = '';
    showToast('已停止監控');
  };

  window.clearAllData = function() {
    if (!confirm('確定清除所有留言資料？')) return;
    allMessages = [];
    userCounts = {};
    syncYtData();
    renderCountTable();
    document.getElementById('totalFetched').textContent = '';
    showToast('已清除留言資料');
  };

  async function fetchMessages() {
    if (!liveChatId) return;
    let url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&maxResults=200&key=${API_KEY}`;
    if (nextPageToken) url += `&pageToken=${nextPageToken}`;

    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    nextPageToken = data.nextPageToken || nextPageToken;
    const items = data.items || [];
    let newCount = 0;

    items.forEach(item => {
      const snippet = item.snippet;
      const author = item.authorDetails;
      if (snippet.type !== 'textMessageEvent') return;
      if (allMessages.find(m => m.id === item.id)) return;

      const ytName = author.displayName;
      const publishedAt = snippet.publishedAt;
      const msgText = snippet.textMessageDetails?.messageText || '';

      newCount++;
      allMessages.push({ id: item.id, ytName, text: msgText, time: publishedAt });

      if (!userCounts[ytName]) userCounts[ytName] = { count: 0, lastTime: publishedAt };
      userCounts[ytName].count++;
      userCounts[ytName].lastTime = publishedAt;
    });

    // 每次抓完同步到 Firebase（取代 localStorage）
    syncYtData();

    document.getElementById('totalFetched').textContent = `已抓取 ${allMessages.length} 則留言`;
    renderCountTable();
    if (newCount > 0) showToast(`新增 ${newCount} 則留言`);
  }

  // ── 介面渲染 ──
  window.renderCountTable = function() {
    const tbody = document.getElementById('countTableBody');
    let entries = Object.entries(userCounts).map(([yt, v]) => ({ ytName: yt, ...v }));

    if (sortMode === 'count') entries.sort((a, b) => b.count - a.count);
    else entries.sort((a, b) => a.ytName.localeCompare(b.ytName));

    if (entries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">📡 尚無留言資料</div></td></tr>';
      document.getElementById('countInfo').textContent = '';
      return;
    }

    tbody.innerHTML = entries.map((e, i) => {
      const matched = matchUser(e.ytName);
      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
      return `<tr>
        <td><div class="rank-badge ${rankClass}">${i+1}</div></td>
        <td><div class="yt-name">${esc(e.ytName)}</div></td>
        <td>${matched ? `<div class="real-name">${esc(matched.realName)}</div>` : '<div class="unmatched">未登記</div>'}</td>
        <td>${matched ? `<span class="unit-badge">${esc(matched.unitName)}</span>` : '-'}</td>
        <td><div class="count-num">${e.count}</div></td>
        <td><div class="last-time">${new Date(e.lastTime).toLocaleTimeString('zh-TW')}</div></td>
      </tr>`;
    }).join('');

    document.getElementById('countInfo').textContent = `共 ${entries.length} 位使用者`;
  };

  window.exportCountCSV = function() {
    const entries = Object.entries(userCounts).map(([yt, v]) => ({ ytName: yt, ...v }));
    if (!entries.length) { showToast('沒有資料可匯出'); return; }
    entries.sort((a, b) => b.count - a.count);
    const headers = ['排名','YouTube帳號','本名','單位','留言次數','最後留言時間'];
    const rows = entries.map((e, i) => {
      const m = matchUser(e.ytName);
      return [i+1, e.ytName, m ? m.realName : '未登記', m ? m.unitName : '-', e.count, new Date(e.lastTime).toLocaleString('zh-TW')];
    });
    const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `YT留言統計_${Date.now()}.csv`;
    a.click();
    showToast('CSV 匯出完成 ✓');
  };

  // ── 關鍵字搜尋 ──
  window.addKeyword = function() {
    const val = document.getElementById('kwInput').value.trim();
    if (!val || keywords.includes(val)) return;
    keywords.push(val);
    syncYtData();
    document.getElementById('kwInput').value = '';
    renderKeywordChips();
  };

  window.removeKeyword = function(kw) {
    keywords = keywords.filter(k => k !== kw);
    syncYtData();
    renderKeywordChips();
  };

  window.renderKeywordChips = function() {
    document.getElementById('kwChips').innerHTML = keywords.map(kw =>
      `<div class="keyword-chip">${esc(kw)}<button onclick="removeKeyword('${esc(kw)}')">✕</button></div>`
    ).join('');
  };

  window.searchKeywords = function() {
    if (keywords.length === 0) { showToast('請先新增關鍵字'); return; }
    const results = allMessages.filter(m => keywords.some(kw => m.text.toLowerCase().includes(kw.toLowerCase())));
    const tbody = document.getElementById('kwTableBody');

    if (results.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">🔍 沒有符合的留言</div></td></tr>';
      return;
    }

    tbody.innerHTML = [...results].reverse().map(m => {
      const matched = matchUser(m.ytName);
      let text = esc(m.text);
      keywords.forEach(kw => {
        const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        text = text.replace(re, `<span class="keyword-highlight">$&</span>`);
      });

      return `<tr>
        <td style="font-size:1.1rem">${new Date(m.time).toLocaleString('zh-TW')}</td>
        <td><div class="yt-name">${esc(m.ytName)}</div></td>
        <td>${matched ? esc(matched.realName) : '<span class="unmatched">未登記</span>'}</td>
        <td>${matched ? `<span class="unit-badge">${esc(matched.unitName)}</span>` : '-'}</td>
        <td><div class="msg-text">${text}</div></td>
        <td>${keywords.filter(kw => m.text.toLowerCase().includes(kw.toLowerCase())).map(kw => `<span class="keyword-chip">${esc(kw)}</span>`).join('')}</td>
      </tr>`;
    }).join('');
  };

  // ── 輔助工具 ──
  function extractVideoId(input) {
    const patterns = [/(?:v=|youtu\.be\/|\/live\/)([A-Za-z0-9_-]{11})/, /^([A-Za-z0-9_-]{11})$/];
    for (const p of patterns) { const m = input.match(p); if (m) return m[1]; }
    return null;
  }

  async function getLiveChatId(videoId) {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`);
    const data = await res.json();
    const details = data.items?.[0]?.liveStreamingDetails;
    if (!details?.activeLiveChatId) throw new Error('找不到直播聊天室，請確認是否正在直播');
    return details.activeLiveChatId;
  }

  window.sortBy = function(mode) { sortMode = mode; renderCountTable(); };
  window.switchTab = function(name) {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  };

  function setStatus(s) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'dot' + (s==='active'?' active':s==='error'?' error':'');
    text.textContent = s==='active'?'監控中':s==='connecting'?'連線中...':s==='error'?'發生錯誤':'未啟動';
  }

  function startCountdown() {
    clearInterval(countdownInterval);
    countdown = 60;
    countdownInterval = setInterval(() => {
      countdown--;
      document.getElementById('nextUpdateText').textContent = `下次更新：${countdown}s 後`;
      if (countdown <= 0) countdown = 60;
    }, 1000);
  }
  function resetCountdown() { countdown = 60; }
  function showError(msg) { const b = document.getElementById('errorBox'); b.textContent = '⚠️ ' + msg; b.classList.add('show'); }
  function hideError() { document.getElementById('errorBox').classList.remove('show'); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  let tTimer;
  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    clearTimeout(tTimer); tTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 初始化
  loadYtData();
</script>
</body>
</html>
