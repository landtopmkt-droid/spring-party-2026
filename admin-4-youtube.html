<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台4 — YouTube 監控</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
    --border:rgba(212,168,67,0.15);--gold:#d4a843;--gold-light:#f0c96a;
    --red:#c0272d;--red-light:#e8474e;--text:#e8e0d0;
    --text-muted:rgba(232,224,208,0.45);--green:#4caf50;--blue:#4a9eff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;}
  .nav-brand{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:900;color:var(--gold);letter-spacing:0.2em;margin-right:32px;white-space:nowrap;}
  .nav-links{display:flex;gap:4px;}
  .nav-link{padding:8px 16px;border-radius:4px;color:var(--text-muted);text-decoration:none;font-size:1.275rem;transition:all .2s;white-space:nowrap;}
  .nav-link:hover{color:var(--text);background:var(--surface2);}
  .nav-link.active{color:var(--gold);background:rgba(212,168,67,0.08);}

  .main{padding:32px;max-width:1300px;margin:0 auto;}
  .page-title{font-family:'Noto Serif TC',serif;font-size:2.25rem;font-weight:900;color:var(--gold);letter-spacing:0.1em;margin-bottom:4px;}
  .page-subtitle{color:var(--text-muted);font-size:1.275rem;margin-bottom:28px;}

  .setup-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:24px;}
  .setup-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
  .setup-group{flex:1;min-width:200px;}
  .form-label{display:block;font-size:1.17rem;color:var(--text-muted);letter-spacing:0.1em;margin-bottom:8px;}
  .form-input{width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:10px 14px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:1.35rem;outline:none;transition:border-color .2s;}
  .form-input:focus{border-color:var(--gold);}
  .form-input::placeholder{color:var(--text-muted);font-size:1.23rem;}

  .btn{padding:10px 20px;border-radius:4px;border:none;font-family:'Noto Sans TC',sans-serif;font-size:1.275rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-gold{background:linear-gradient(135deg,#a07820,var(--gold));color:#1a0a00;font-weight:500;}
  .btn-gold:hover{filter:brightness(1.1);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
  .btn-red{background:linear-gradient(135deg,#8b1a1e,var(--red));color:#fff;}
  .btn-red:hover{filter:brightness(1.1);}
  .btn-green{background:linear-gradient(135deg,#2e7d32,var(--green));color:#fff;}
  .btn-green:hover{filter:brightness(1.1);}
  .btn-sm{padding:7px 14px;font-size:1.2rem;}

  .status-bar{display:flex;align-items:center;gap:16px;padding:10px 16px;background:var(--surface2);border-radius:4px;margin-top:12px;font-size:1.23rem;flex-wrap:wrap;}
  .status-indicator{display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#555;}
  .dot.active{background:var(--green);animation:blink 1.2s infinite;}
  .dot.error{background:var(--red-light);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .tab-btn{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;font-size:1.32rem;cursor:pointer;transition:all .2s;letter-spacing:0.05em;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* ── Tab1: 留言次數 ── */
  .count-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .count-info{font-size:1.23rem;color:var(--text-muted);margin-left:auto;}
  .count-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;max-height:500px;overflow-y:auto;}
  table{width:100%;border-collapse:collapse;}
  thead{position:sticky;top:0;z-index:5;}
  thead tr{background:var(--surface2);}
  th{padding:12px 16px;text-align:left;font-size:1.125rem;color:var(--gold);letter-spacing:0.15em;font-weight:500;border-bottom:1px solid var(--border);}
  td{padding:12px 16px;font-size:1.32rem;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(212,168,67,0.02);}
  .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:1.125rem;font-weight:600;}
  .rank-1{background:rgba(212,168,67,0.2);color:var(--gold-light);}
  .rank-2{background:rgba(192,192,192,0.15);color:#c0c0c0;}
  .rank-3{background:rgba(205,127,50,0.15);color:#cd7f32;}
  .rank-n{background:rgba(255,255,255,0.05);color:var(--text-muted);}
  .yt-name{color:var(--blue);font-size:1.275rem;}
  .real-name{font-size:1.35rem;}
  .unit-badge{display:inline-block;padding:2px 8px;background:rgba(212,168,67,0.1);color:var(--gold);border-radius:10px;font-size:1.125rem;}
  .unmatched{color:var(--text-muted);font-style:italic;font-size:1.23rem;}
  .count-num{font-size:1.65rem;font-weight:500;}
  .last-time{font-size:1.17rem;color:var(--text-muted);}

  /* ── Tab2: 關鍵字群組 ── */
  .add-group-form{display:flex;gap:10px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px;flex-wrap:wrap;}
  .add-group-form .form-group{flex:1;min-width:160px;}
  .color-swatch-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
  .color-swatch:hover{transform:scale(1.2);}
  .color-swatch.selected{border-color:#fff;transform:scale(1.15);}
  .group-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
  .group-card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .2s;}
  .group-card-header:hover{background:rgba(255,255,255,0.02);}
  .group-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .group-name{font-size:1.35rem;font-weight:500;flex:1;}
  .group-meta{font-size:1.17rem;color:var(--text-muted);}
  .results-count-badge{padding:3px 10px;border-radius:12px;font-size:1.17rem;font-weight:500;background:rgba(255,255,255,0.06);}
  .group-chevron{color:var(--text-muted);font-size:1.1rem;transition:transform .2s;}
  .group-card.open .group-chevron{transform:rotate(180deg);}
  .group-card-body{display:none;padding:0 18px 16px;border-top:1px solid rgba(255,255,255,0.04);}
  .group-card.open .group-card-body{display:block;}
  .kw-chips-area{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;min-height:32px;}
  .kw-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:1.23rem;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);}
  .kw-chip-del{background:none;border:none;color:currentColor;cursor:pointer;font-size:1.2rem;padding:0;line-height:1;opacity:0.5;}
  .kw-chip-del:hover{opacity:1;}
  .add-kw-row{display:flex;gap:8px;margin-top:4px;}
  .add-kw-input{flex:1;background:var(--surface2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:8px 12px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:1.275rem;outline:none;}
  .add-kw-input:focus{border-color:var(--gold);}
  .group-results{margin-top:14px;}
  .kw-results-table{background:var(--surface2);border:1px solid rgba(255,255,255,0.05);border-radius:6px;overflow:hidden;max-height:360px;overflow-y:auto;}
  .kw-results-table table{min-width:560px;}
  .keyword-highlight{padding:1px 4px;border-radius:2px;font-weight:600;}
  .msg-text{font-size:1.275rem;color:var(--text);line-height:1.5;}
  .group-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

  /* ── Tab3: 競猜活動 ── */
  .pred-add-form{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:20px;}
  .pred-form-group{flex:1;min-width:200px;}
  .round-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
  .round-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .2s;}
  .round-header:hover{background:rgba(255,255,255,0.02);}
  .round-num{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:rgba(212,168,67,0.12);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.17rem;font-weight:600;}
  .round-name-text{font-size:1.35rem;font-weight:500;flex:1;}
  .round-status-badge{padding:3px 12px;border-radius:12px;font-size:1.1rem;font-weight:500;}
  .round-status-badge.open{background:rgba(76,175,80,0.15);color:#4caf50;border:1px solid rgba(76,175,80,0.3);animation:badgePulse 1.5s infinite;}
  .round-status-badge.closed{background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid rgba(255,255,255,0.08);}
  @keyframes badgePulse{0%,100%{opacity:1}50%{opacity:0.6}}
  .round-msg-count{font-size:1.17rem;color:var(--text-muted);}
  .round-chevron{color:var(--text-muted);font-size:1.1rem;transition:transform .2s;}
  .round-card.open .round-chevron{transform:rotate(180deg);}
  .round-body{display:none;padding:16px 18px 18px;border-top:1px solid rgba(255,255,255,0.04);}
  .round-card.open .round-body{display:block;}
  .round-section-label{font-size:1.1rem;color:var(--text-muted);letter-spacing:0.1em;margin-bottom:8px;margin-top:14px;}
  .round-section-label:first-child{margin-top:0;}
  .option-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:32px;}
  .option-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:1.23rem;background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.25);color:#4a9eff;}
  .option-chip.correct{background:rgba(76,175,80,0.15);border-color:rgba(76,175,80,0.4);color:#4caf50;}
  .option-chip-del{background:none;border:none;color:currentColor;cursor:pointer;font-size:1.2rem;padding:0;line-height:1;opacity:0.5;}
  .option-chip-del:hover{opacity:1;}
  .answer-select{background:var(--surface2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:8px 12px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:1.275rem;outline:none;min-width:180px;}
  .answer-select:focus{border-color:var(--gold);}
  .round-controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center;}
  .round-time-info{font-size:1.1rem;color:var(--text-muted);margin-left:auto;}
  .round-msgs-toggle{display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;user-select:none;color:var(--text-muted);font-size:1.2rem;}
  .round-msgs-toggle:hover{color:var(--text);}
  .round-msgs-body{display:none;margin-top:8px;}
  .round-msgs-body.open{display:block;}
  .round-msgs-table{background:var(--surface2);border:1px solid rgba(255,255,255,0.05);border-radius:6px;overflow:hidden;max-height:280px;overflow-y:auto;}
  .round-msgs-table table{min-width:560px;}
  .pred-filter-card{background:var(--surface);border:1px solid rgba(212,168,67,0.2);border-radius:8px;padding:20px 24px;margin-top:24px;}
  .pred-filter-title{font-size:1.35rem;font-weight:500;color:var(--gold);margin-bottom:6px;}
  .pred-filter-desc{font-size:1.2rem;color:var(--text-muted);}
  .filter-result-header{display:flex;align-items:center;gap:12px;margin:16px 0 10px;flex-wrap:wrap;}
  .filter-result-title{font-size:1.275rem;color:var(--text);font-weight:500;}
  .filter-winner-count{padding:3px 12px;border-radius:12px;font-size:1.17rem;background:rgba(212,168,67,0.12);color:var(--gold);}
  .filter-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;max-height:400px;overflow-y:auto;}
  .winner-row td{background:rgba(212,168,67,0.04);}

  .empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);}
  .empty-icon{font-size:3.75rem;margin-bottom:10px;}
  .error-box{padding:14px 18px;background:rgba(192,39,45,0.08);border:1px solid rgba(192,39,45,0.25);border-radius:6px;font-size:1.275rem;color:#ff8a80;margin-top:12px;display:none;}
  .error-box.show{display:block;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px 20px;color:var(--text);font-size:1.32rem;z-index:200;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);}
  .toast.show{transform:translateY(0);opacity:1;}

  @media(max-width:900px){
    .nav{padding:8px 16px;height:auto;flex-wrap:wrap;}
    .nav-brand{margin-right:16px;font-size:0.9rem;}
    .nav-link{padding:6px 10px;font-size:0.78rem;}
    .setup-row{flex-direction:column;}
    .setup-group{min-width:unset;width:100%;}
  }
  @media(max-width:600px){
    .main{padding:12px;}
    .nav{padding:8px 12px;}
    .nav-links{flex-wrap:wrap;gap:2px;}
    .nav-link{padding:5px 8px;font-size:0.72rem;}
    .page-title{font-size:1.2rem;}
    .setup-panel,.pred-add-form{padding:16px;}
    .count-toolbar{flex-direction:column;align-items:flex-start;gap:8px;}
    .count-info{margin-left:0;}
    .count-table-wrap,.kw-results-table,.round-msgs-table,.filter-table-wrap{overflow-x:auto;}
    table{min-width:560px;}
    th,td{padding:8px 10px;font-size:0.78rem;}
    .add-group-form{flex-direction:column;}
    .pred-add-form{flex-direction:column;}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">🏮 春酒後台</div>
  <div class="nav-links">
    <a href="admin-1-registrations.html" class="nav-link">報名名單</a>
    <a href="admin-2-redpacket.html" class="nav-link">紅包雨</a>
    <a href="admin-3-lottery.html" class="nav-link">抽獎管理</a>
    <a href="admin-4-youtube.html" class="nav-link active">YT 監控</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">YouTube 直播監控</div>
  <div class="page-subtitle">即時追蹤留言數量、關鍵字分類與競猜活動</div>

  <!-- 監控設定 -->
  <div class="setup-panel">
    <div class="setup-row">
      <div class="setup-group" style="flex:2">
        <label class="form-label">YouTube 直播影片 ID 或網址</label>
        <input type="text" class="form-input" id="videoIdInput" placeholder="例：dQw4w9WgXcQ 或完整網址">
      </div>
      <button class="btn btn-green" id="btnStart" onclick="startMonitor()">開始監控</button>
      <button class="btn btn-red" id="btnStop" onclick="stopMonitor()" disabled>停止</button>
      <button class="btn btn-outline btn-sm" onclick="clearAllData()">清除資料</button>
    </div>
    <div class="status-bar">
      <div class="status-indicator">
        <div class="dot" id="statusDot"></div>
        <span id="statusText" style="color:var(--text-muted)">未啟動</span>
      </div>
      <span id="nextUpdateText" style="color:var(--text-muted)"></span>
      <span id="totalFetched" style="color:var(--text-muted)"></span>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('count')">📊 留言次數統計</button>
    <button class="tab-btn" onclick="switchTab('keyword')">🗂 關鍵字分類</button>
    <button class="tab-btn" onclick="switchTab('predict')">🏆 競猜活動</button>
  </div>

  <!-- Tab1：留言次數統計 -->
  <div class="tab-content active" id="tab-count">
    <div class="count-toolbar">
      <button class="btn btn-outline btn-sm" onclick="sortBy('count')">依留言數排序</button>
      <button class="btn btn-outline btn-sm" onclick="sortBy('name')">依姓名排序</button>
      <button class="btn btn-outline btn-sm" onclick="exportCountCSV()">匯出 CSV</button>
      <span class="count-info" id="countInfo"></span>
    </div>
    <div class="count-table-wrap">
      <table>
        <thead><tr>
          <th style="width:48px">#</th><th>YouTube 帳號</th><th>本名</th><th>單位</th><th>留言次數</th><th>最後留言時間</th>
        </tr></thead>
        <tbody id="countTableBody">
          <tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📡</div><div>請輸入直播 ID 並開始監控</div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Tab2：關鍵字分類（群組） -->
  <div class="tab-content" id="tab-keyword">
    <div class="add-group-form">
      <div class="form-group">
        <label class="form-label">群組名稱</label>
        <input type="text" class="form-input" id="newGroupName" placeholder="例：紅包組、發財組...">
      </div>
      <div class="form-group">
        <label class="form-label">顏色</label>
        <div class="color-swatch-row" id="colorSwatches"></div>
      </div>
      <button class="btn btn-gold" style="align-self:flex-end" onclick="addGroup()">＋ 新增群組</button>
    </div>
    <div id="groupsList">
      <div class="empty-state"><div class="empty-icon">🗂</div><div>尚未建立任何關鍵字群組</div></div>
    </div>
  </div>

  <!-- Tab3：競猜活動 -->
  <div class="tab-content" id="tab-predict">
    <div class="pred-add-form">
      <div class="pred-form-group">
        <label class="form-label">場次名稱</label>
        <input type="text" class="form-input" id="newRoundName" placeholder="例：第一場喝啤酒比賽" onkeydown="if(event.key==='Enter')addRound()">
      </div>
      <button class="btn btn-gold" onclick="addRound()">＋ 新增場次</button>
    </div>
    <div id="roundsList">
      <div class="empty-state"><div class="empty-icon">🏆</div><div>尚未建立任何場次</div></div>
    </div>
    <div id="predFilterSection" style="display:none">
      <div class="pred-filter-card">
        <div class="pred-filter-title">🎯 篩選全場猜對的人</div>
        <div class="pred-filter-desc">為每場次設定正確答案後，篩選出所有場次都猜對的得獎者</div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-gold" onclick="runFilter()">▶ 執行篩選</button>
          <button class="btn btn-outline btn-sm" onclick="exportFilterCSV()">匯出 CSV</button>
        </div>
      </div>
      <div id="filterResult"></div>
    </div>
  </div>

</div><!-- /.main -->

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyCNFt387HP9NZdoIx517GcfUO5RFHdmtMA",
  authDomain:"springfestival-4aaea.firebaseapp.com",
  projectId:"springfestival-4aaea",
  databaseURL:"https://springfestival-4aaea-default-rtdb.firebaseio.com",
  storageBucket:"springfestival-4aaea.firebasestorage.app",

async function fetchMessages(){
  if(!liveChatId)return;
  let url=`https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&maxResults=200&key=${API_KEY}`;
  if(nextPageToken)url+=`&pageToken=${nextPageToken}`;
  const res=await fetch(url);
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  nextPageToken=data.nextPageToken||nextPageToken;
  let newCount=0;
  (data.items||[]).forEach(item=>{
    if(item.snippet.type!=='textMessageEvent')return;
    if(allMessages.find(m=>m.id===item.id))return;
    const ytName=item.authorDetails.displayName;
    const time=item.snippet.publishedAt;
    const text=item.snippet.textMessageDetails?.messageText||'';
    newCount++;
    const msg={id:item.id,ytName,text,time};
    allMessages.push(msg);
    if(!userCounts[ytName])userCounts[ytName]={count:0,lastTime:time};
    userCounts[ytName].count++;
    userCounts[ytName].lastTime=time;
    collectRoundMessages(msg);
  });
  syncMessages();
  if(rounds.some(r=>r.isOpen))syncRounds();
  document.getElementById('totalFetched').textContent=`已抓取 ${allMessages.length} 則留言`;
  renderCountTable();
  document.querySelectorAll('.group-card.open').forEach(card=>{
    const g=groups.find(x=>x.id==card.dataset.gid);
    if(g)renderGroupResults(card,g);
  });
  // 如有開啟中的場次，更新留言記錄顯示
  if(rounds.some(r=>r.isOpen))renderRounds();
  if(newCount>0)showToast(`新增 ${newCount} 則留言`);
}

function collectRoundMessages(msg){
  const now=new Date(msg.time);
  rounds.forEach(r=>{
    if(!r.isOpen)return;
    if(!r.messages)r.messages=[];
    if(r.messages.find(m=>m.id===msg.id))return;
    if(r.openAt&&now<new Date(r.openAt))return;
    const hit=r.options.find(opt=>msg.text.toLowerCase().includes(opt.toLowerCase()));
    if(!hit)return;
    r.messages.push({id:msg.id,ytName:msg.ytName,text:msg.text,time:msg.time,matched:hit});
  });
}

        <button class="option-chip-del" onclick="removeOptionFromRound(${r.id},'${esc(opt)}')">✕</button>
      </div>`).join('');
    const ansOpts='<option value="">— 選擇正確答案 —</option>'+(r.options||[]).map(opt=>`<option value="${esc(opt)}" ${r.answer===opt?'selected':''}>${esc(opt)}</option>`).join('');
    const msgRows=(r.messages||[]).length?[...(r.messages||[])].reverse().slice(0,200).map(m=>{
      const mt=matchUser(m.ytName);
      return`<tr>
        <td style="font-size:1.1rem;white-space:nowrap">${new Date(m.time).toLocaleTimeString('zh-TW')}</td>
        <td><div class="yt-name">${esc(m.ytName)}</div></td>
        <td>${mt?esc(mt.realName):'<span class="unmatched">未登記</span>'}</td>
        <td><span style="color:#4a9eff;font-size:1.2rem">${esc(m.matched)}</span></td>
        <td><div class="msg-text">${esc(m.text)}</div></td>
      </tr>`;
    }).join(''):`<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px">尚無符合留言</td></tr>`;
    const timeInfo=r.openAt?`開啟：${new Date(r.openAt).toLocaleTimeString('zh-TW')}${r.closeAt?' ／ 關閉：'+new Date(r.closeAt).toLocaleTimeString('zh-TW'):''}` :'';
    const ctrlBtn=!r.isOpen&&!r.closeAt
      ?`<button class="btn btn-green btn-sm" onclick="openRound(${r.id})">▶ 開始收集留言</button>`
      :r.isOpen
      ?`<button class="btn btn-red btn-sm" onclick="closeRound(${r.id})">⏹ 停止收集</button>`
      :`<button class="btn btn-outline btn-sm" onclick="openRound(${r.id})">↺ 重新開啟</button>`;
    return`<div class="round-card" data-rid="${String(r.id)}">
      <div class="round-header" onclick="toggleRoundCard(${r.id})">
        <div class="round-num">${idx+1}</div>
        <div class="round-name-text">${esc(r.name)}</div>
        <div class="round-status-badge ${statusCls}">${statusLabel}</div>
        <div class="round-msg-count">${msgCount} 則留言</div>
        <div class="round-chevron">▾</div>
      </div>
      <div class="round-body">
        <div class="round-section-label">選手選項</div>
        <div class="option-chips">${chips||'<span style="color:var(--text-muted);font-size:1.2rem">尚未新增選項</span>'}</div>
        <div class="add-kw-row">
          <input type="text" class="add-kw-input" id="optinput-${r.id}" placeholder="新增選手名稱..." onkeydown="if(event.key==='Enter')addOptionToRound(${r.id})">
          <button class="btn btn-gold btn-sm" onclick="addOptionToRound(${r.id})">新增</button>
        </div>
        <div class="round-section-label" style="margin-top:16px">賽後設定正確答案</div>
        <select class="answer-select" onchange="setRoundAnswer(${r.id},this.value)">${ansOpts}</select>
        <div class="round-controls">
          ${ctrlBtn}
          <button class="btn btn-sm" style="background:transparent;border:1px solid rgba(192,39,45,0.3);color:#e57373" onclick="deleteRound(${r.id})">刪除場次</button>
          <div class="round-time-info">${timeInfo}</div>
        </div>
        <div class="round-msgs-toggle" onclick="toggleRoundMsgs(${r.id})">▸ 留言記錄（${msgCount} 則）${msgCount>200?'，顯示最新 200 則':''}</div>
        <div class="round-msgs-body" id="msgs-body-${r.id}">
          <div class="round-msgs-table"><table>
            <thead><tr><th>時間</th><th>YouTube帳號</th><th>本名</th><th>命中選項</th><th>留言內容</th></tr></thead>
            <tbody>${msgRows}</tbody>
          </table></div>
        </div>
      </div>
    </div>`;
  }).join('');
  // 恢復展開狀態（rid 統一用字串比對）
  openCards.forEach(rid=>{
    const card=document.querySelector('.round-card[data-rid="'+rid+'"]');
    if(card)card.classList.add('open');
  });
  openMsgs.forEach(rid=>{
    const el=document.getElementById('msgs-body-'+rid);
    if(el)el.classList.add('open');
  });
}

// ── 工具 ──
function extractVideoId(input){
  const ps=[/(?:v=|youtu\.be\/|\/live\/)([A-Za-z0-9_-]{11})/,/^([A-Za-z0-9_-]{11})$/];
  for(const p of ps){const m=input.match(p);if(m)return m[1];}return null;
}
async function getLiveChatId(vid){
  const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${vid}&key=${API_KEY}`);
  const data=await res.json();
  const d=data.items?.[0]?.liveStreamingDetails;
  if(!d?.activeLiveChatId)throw new Error('找不到直播聊天室，請確認是否正在直播');
  return d.activeLiveChatId;
}
window.sortBy=function(mode){sortMode=mode;renderCountTable();};
window.switchTab=function(name){
  document.querySelectorAll('.tab-btn,.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
};
function setStatus(s){
  document.getElementById('statusDot').className='dot'+(s==='active'?' active':s==='error'?' error':'');
  document.getElementById('statusText').textContent=s==='active'?'監控中':s==='connecting'?'連線中...':s==='error'?'發生錯誤':'未啟動';
}
function startCountdown(){
  clearInterval(countdownInterval);countdown=60;
  countdownInterval=setInterval(()=>{
    countdown--;
    document.getElementById('nextUpdateText').textContent=`下次更新：${countdown}s 後`;
    if(countdown<=0)countdown=60;
  },1000);
}
function resetCountdown(){countdown=60;}
function showError(msg){const b=document.getElementById('errorBox');b.textContent='⚠️ '+msg;b.classList.add('show');}
function hideError(){document.getElementById('errorBox').classList.remove('show');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dl(csv,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=filename;a.click();
}
let tTimer;
function showToast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

// ── 初始化 ──
initSwatches();
loadData();
</script>
