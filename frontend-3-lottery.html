<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春酒活動 — 抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0272d;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --cream: #fdf6e3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Noto Serif TC', serif;
  }

  /* ── 點擊解鎖層（一般瀏覽器需要；OBS 可直接點一下） ── */
  #unlockOverlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(10,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
  }
  #unlockOverlay.hidden { display: none; }
  #unlockOverlay .u-icon { font-size: 5rem; }
  #unlockOverlay .u-text {
    color: var(--gold);
    font-size: 1.5rem;
    letter-spacing: 0.25em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ── 抽獎影片畫面 ── */
#drawScreen {
  position: fixed; 
  inset: 0; 
  z-index: 10;
  background: transparent !important; /* 確保背景全透 */
  display: none;
  align-items: center;
  justify-content: center;
}

#drawScreen.show {
  display: flex; /* 當顯示時，從 block 改為 flex */
}

#drawVideo { 
  max-width: 80%; 
  max-height: 80%; 
  width: auto;
  height: auto;
  object-fit: contain;
  /* 如果你的 WebM 邊緣還是有一點黑邊，可以取消註解下面這行 */
  /* mix-blend-mode: screen; */ 
}

  /* ── 得獎結果畫面 ── */
  /* ── 結果畫面：固定頂部標題 + 名單區可捲動 ── */
  #resultScreen {
    position: fixed; inset: 0; z-index: 20;
    background: linear-gradient(135deg, #1a0500, #0a0000, #1a0500);
    display: none;
    flex-direction: column;
    overflow: hidden; /* 整體不捲動，只讓名單區捲動 */
  }
  #resultScreen.show {
    display: flex;
    animation: fadeInScale 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* 固定在頂部的標題區 */
  .result-header {
    text-align: center;
    padding: 28px 20px 16px;
    flex-shrink: 0; /* 不壓縮，永遠可見 */
  }
  .result-prize-label { font-size: 1.5rem; color: rgba(212,168,67,0.55); letter-spacing: 0.45em; margin-bottom: 10px; }
  .result-prize-name  { font-size: 4.5rem; font-weight: 900; color: var(--gold-light); letter-spacing: 0.15em; text-shadow: 0 0 40px rgba(212,168,67,0.45); line-height: 1.1; }
  .result-count       { font-size: 1.65rem; color: rgba(212,168,67,0.45); letter-spacing: 0.3em; margin-top: 10px; }

  .result-divider { width: 220px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 0 auto 12px; flex-shrink: 0; }

  /* 名單區：可捲動，佔滿剩餘空間 */
  .winners-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 32px;
    /* 捲軸美化 */
    scrollbar-width: thin;
    scrollbar-color: rgba(212,168,67,0.3) transparent;
  }
  .winners-scroll::-webkit-scrollbar { width: 4px; }
  .winners-scroll::-webkit-scrollbar-track { background: transparent; }
  .winners-scroll::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.3); border-radius: 2px; }

  .winners-grid { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* card 大小根據人數自動縮放，透過 JS 動態設定 --card-scale */
  .winner-card {
    background: rgba(192,39,45,0.15);
    border: 1px solid rgba(212,168,67,0.28);
    border-radius: 6px;
    padding: calc(20px * var(--card-scale, 1)) calc(26px * var(--card-scale, 1));
    text-align: center;
    min-width: calc(150px * var(--card-scale, 1));
    animation: cardReveal 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(28px) scale(0.82); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .winner-index { font-size: calc(1.08rem * var(--card-scale, 1)); color: rgba(212,168,67,0.38); letter-spacing: 0.2em; margin-bottom: 6px; }
  .winner-name  { font-size: calc(2.175rem * var(--card-scale, 1)); font-weight: 700; color: var(--cream); letter-spacing: 0.08em; margin-bottom: 5px; }
  .winner-unit  { font-size: calc(1.23rem * var(--card-scale, 1)); color: rgba(212,168,67,0.55); letter-spacing: 0.1em; font-family: 'Noto Sans TC', sans-serif; }

  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 25;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 768px) {
    .result-prize-name { font-size: 2.1rem; }
    .result-count { font-size: 0.95rem; }
    .winners-grid { gap: 10px; }
    .result-prize-label { font-size: 0.85rem; }
    .result-header { padding: 20px 16px 12px; }
  }
  @media (max-width: 480px) {
    .result-prize-name { font-size: 1.7rem; }
    .winners-grid { gap: 8px; }
    .winners-scroll { padding: 8px 10px 24px; }
  }
</style>
</head>
<body>

<!-- 首次點擊解鎖（讓瀏覽器允許影片自動播放） -->
<div id="unlockOverlay" onclick="unlock()">
  <div class="u-icon">🎊</div>
  <div class="u-text">點擊畫面以啟動抽獎系統</div>
</div>

<div id="drawScreen">
  <video id="drawVideo" muted playsinline preload="auto">
    <source src="lottery-draw.webm" type="video/webm">
    <source src="lottery-draw.mp4" type="video/mp4">
  </video>
</div>

<div id="resultScreen">
  <div class="result-header">
    <div class="result-prize-label">✦ 恭喜得獎 ✦</div>
    <div class="result-prize-name" id="resultPrizeName"></div>
    <div class="result-count"      id="resultCount"></div>
  </div>
  <div class="result-divider"></div>
  <div class="winners-scroll">
    <div class="winners-grid" id="winnersGrid"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCNFt387HP9NZdoIx517GcfUO5RFHdmtMA",
    authDomain:        "springfestival-4aaea.firebaseapp.com",
    projectId:         "springfestival-4aaea",
    databaseURL:       "https://springfestival-4aaea-default-rtdb.firebaseio.com",
    storageBucket:     "springfestival-4aaea.firebasestorage.app",
    messagingSenderId: "64196762294",
    appId:             "1:64196762294:web:2fb6e766f38f8d47332417",
    measurementId:     "G-4MZF0HPLJV"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── State ──
  // 'idle' → 等待指令
  // 'drawing' → 播放影片中
  // 'result' → 顯示得獎名單
  let state            = 'idle';
  let unlocked         = false;
  let pendingData      = null;   // unlock 前暫存的指令
  let lastTimestamp    = 0;      // 已處理過的最新 timestamp，防止重複觸發

  const DRAW_DURATION_MS = 6000;

  const drawScreen  = document.getElementById('drawScreen');
  const resultScreen = document.getElementById('resultScreen');
  const drawVideo   = document.getElementById('drawVideo');

  // ── 解鎖點擊 ──
  window.unlock = function() {
    unlocked = true;
    document.getElementById('unlockOverlay').classList.add('hidden');

    if (pendingData) {
      handleCommand(pendingData);
      pendingData = null;
    }
  };

  // ── 抽獎流程 ──
  function startDraw(data) {
    if (state !== 'idle') return;
    state = 'drawing';

    drawScreen.classList.add('show');
    drawVideo.currentTime = 0;

    const playPromise = drawVideo.play();
    let timer = setTimeout(endDraw, DRAW_DURATION_MS);

    if (playPromise !== undefined) {
      playPromise.catch(e => {
        console.warn('影片播放被阻擋，直接跳到結果:', e);
        clearTimeout(timer);
        endDraw();
      });
    }

    drawVideo.addEventListener('ended', () => {
      clearTimeout(timer);
      endDraw();
    }, { once: true });

    // 存好本次名單
    window._currentDrawData = data;
  }

  function endDraw() {
    drawScreen.classList.remove('show');
    drawVideo.pause();
    showResult(window._currentDrawData);
  }

  function showResult(data) {
    if (!data) { resetToIdle(); return; }
    const { prizeName, winners } = data;

    document.getElementById('resultPrizeName').textContent = prizeName;
    document.getElementById('resultCount').textContent     = `共 ${winners.length} 位幸運得主`;

    const grid = document.getElementById('winnersGrid');
    grid.innerHTML = '';
    winners.forEach((w, i) => {
      const card = document.createElement('div');
      card.className = 'winner-card';
      card.style.animationDelay = (i * 0.1) + 's';
      card.innerHTML = `
        <div class="winner-index">第 ${i+1} 位</div>
        <div class="winner-name">${esc(w.realName)}</div>
        <div class="winner-unit">${esc(w.unitName)}</div>
      `;
      grid.appendChild(card);
    });

    // 根據人數自動縮小 card：10 人以下 100%，最多縮到 55%
    const scale = Math.max(0.55, Math.min(1, 10 / Math.max(winners.length, 10)));
    document.getElementById('winnersGrid').style.setProperty('--card-scale', scale);

    resultScreen.classList.add('show');
    // 捲回頂部，確保第一位得獎者可見
    requestAnimationFrame(() => {
      const scrollEl = resultScreen.querySelector('.winners-scroll');
      if (scrollEl) scrollEl.scrollTop = 0;
    });
    launchConfetti();
    state = 'result';
  }

  function resetToIdle() {
    resultScreen.classList.remove('show');
    drawScreen.classList.remove('show');
    window._currentDrawData = null;
    state = 'idle';
  }

  // ── 統一處理從 Firebase 來的指令 ──
  function handleCommand(data) {
    console.log('執行指令:', data.status, '  timestamp:', data.timestamp);

    if (data.status === 'start') {
      // 同一個 timestamp 不重複執行
      if (data.timestamp && data.timestamp === lastTimestamp) return;
      lastTimestamp = data.timestamp || Date.now();

      if (state === 'idle') startDraw(data);

    } else if (data.status === 'reset') {
      resetToIdle();
    }
  }

  // ── 監聽 Firebase lottery_control ──
  onValue(ref(db, 'lottery_control'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    if (!unlocked) {
      // 解鎖前暫存最新指令
      pendingData = data;
      return;
    }

    handleCommand(data);
  });

  // ── 彩帶 ──
  function launchConfetti() {
    const colors = ['#c0272d','#d4a843','#f0c96a','#fff','#ff6b6b','#ffd700'];
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left       = (Math.random() * 100) + 'vw';
        c.style.top        = '-10px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        const sz = (5 + Math.random() * 8) + 'px';
        c.style.width  = sz;
        c.style.height = sz;
        c.style.animationDuration = (3 + Math.random() * 4) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }, i * 35);
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
