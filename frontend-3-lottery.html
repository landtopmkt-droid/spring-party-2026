<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春酒活動 — 抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0272d;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --cream: #fdf6e3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Noto Serif TC', serif;
  }

  #unlockOverlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(10,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
  }
  #unlockOverlay.hidden { display: none; }
  #unlockOverlay .u-icon { font-size: 5rem; }
  #unlockOverlay .u-text {
    color: var(--gold);
    font-size: 1.5rem;
    letter-spacing: 0.25em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  #drawScreen {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: transparent !important;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #drawScreen.show { display: flex; }

  /* 用 canvas 渲染 VP9 alpha，避免 Chrome 卡第一幀 */
  #drawCanvas {
    max-width: 80%;
    max-height: 80%;
    width: auto;
    height: auto;
  }
  /* 隱藏的 video 元素只用來解碼，不顯示 */
  #drawVideo { display: none; }

  #resultScreen {
    position: fixed; inset: 0; z-index: 20;
    background: linear-gradient(135deg, #1a0500, #0a0000, #1a0500);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #resultScreen.show {
    display: flex;
    animation: fadeInScale 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  .result-header {
    text-align: center;
    padding: 16px 20px 8px;
    flex-shrink: 0;
  }
  .result-prize-label { font-size: 1.3rem; color: #f0c96a; letter-spacing: 0.4em; margin-bottom: 4px; text-shadow: 0 0 12px rgba(240,201,106,0.5); }
  .result-prize-name  { font-size: 3rem; font-weight: 900; color: #fff; letter-spacing: 0.12em; text-shadow: 0 0 40px rgba(212,168,67,0.8), 0 2px 0 rgba(0,0,0,0.5); line-height: 1.1; }
  .result-count       { font-size: 1.4rem; color: #f0c96a; letter-spacing: 0.25em; margin-top: 6px; }

  .result-divider { width: 180px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 8px auto 6px; flex-shrink: 0; }

  .winners-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 32px;
    scrollbar-width: thin;
    scrollbar-color: rgba(212,168,67,0.3) transparent;
  }
  .winners-scroll::-webkit-scrollbar { width: 4px; }
  .winners-scroll::-webkit-scrollbar-track { background: transparent; }
  .winners-scroll::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.3); border-radius: 2px; }

  .winners-grid { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; max-width: 1400px; margin: 0 auto; width: 100%; }

  .winner-card {
    background: rgba(192,39,45,0.2);
    border: 1px solid rgba(212,168,67,0.45);
    border-radius: 8px;
    padding: calc(30px * var(--card-scale, 1)) calc(38px * var(--card-scale, 1));
    text-align: center;
    min-width: calc(220px * var(--card-scale, 1));
    animation: cardReveal 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 0 16px rgba(192,39,45,0.15);
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(28px) scale(0.82); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .winner-index { font-size: calc(1.3rem * var(--card-scale, 1)); color: #f0c96a; letter-spacing: 0.2em; margin-bottom: 6px; font-weight: 500; }
  .winner-name  { font-size: calc(3rem * var(--card-scale, 1)); font-weight: 700; color: #fff; letter-spacing: 0.08em; margin-bottom: 6px; text-shadow: 0 0 12px rgba(255,255,255,0.3); }
  .winner-unit  { font-size: calc(1.5rem * var(--card-scale, 1)); color: #f0c96a; letter-spacing: 0.1em; font-family: 'Noto Sans TC', sans-serif; font-weight: 400; }

  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 25;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 768px) {
    .result-prize-name { font-size: 1.8rem; }
    .result-count { font-size: 0.9rem; }
    .winners-grid { gap: 8px; }
    .result-prize-label { font-size: 0.8rem; }
    .result-header { padding: 12px 16px 6px; }
    .result-divider { margin: 6px auto 4px; }
  }
  @media (max-width: 480px) {
    .result-prize-name { font-size: 1.4rem; }
    .winners-grid { gap: 6px; }
    .winners-scroll { padding: 6px 8px 20px; }
  }
</style>
</head>
<body>

<div id="unlockOverlay" onclick="unlock()">
  <div class="u-icon">🎊</div>
  <div class="u-text">點擊畫面以啟動抽獎系統</div>
</div>

<div id="drawScreen">
  <!-- video 只用來解碼，canvas 負責渲染（解決 VP9 Alpha 卡幀問題）-->
  <video id="drawVideo" muted playsinline preload="auto" style="display:none">
    <source src="lottery-draw.webm" type="video/webm">
    <source src="lottery-draw.mp4" type="video/mp4">
  </video>
  <canvas id="drawCanvas"></canvas>
</div>

<div id="resultScreen">
  <div class="result-header">
    <div class="result-prize-label">✦ 恭喜得獎 ✦</div>
    <div class="result-prize-name" id="resultPrizeName"></div>
    <div class="result-count"      id="resultCount"></div>
  </div>
  <div class="result-divider"></div>
  <div class="winners-scroll">
    <div class="winners-grid" id="winnersGrid"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCNFt387HP9NZdoIx517GcfUO5RFHdmtMA",
    authDomain:        "springfestival-4aaea.firebaseapp.com",
    projectId:         "springfestival-4aaea",
    databaseURL:       "https://springfestival-4aaea-default-rtdb.firebaseio.com",
    storageBucket:     "springfestival-4aaea.firebasestorage.app",
    messagingSenderId: "64196762294",
    appId:             "1:64196762294:web:2fb6e766f38f8d47332417",
    measurementId:     "G-4MZF0HPLJV"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let state         = 'idle';
  let unlocked      = false;
  let pendingData   = null;
  let lastTimestamp = 0;

  const DRAW_DURATION_MS = 6000;

  const drawScreen   = document.getElementById('drawScreen');
  const resultScreen = document.getElementById('resultScreen');
  const drawVideo    = document.getElementById('drawVideo');
  const drawCanvas   = document.getElementById('drawCanvas');
  const ctx          = drawCanvas.getContext('2d');
  let   rafId        = null;  // requestAnimationFrame ID

  window.unlock = function() {
    unlocked = true;
    document.getElementById('unlockOverlay').classList.add('hidden');
    drawVideo.load();  // 預先載入
    if (pendingData) { handleCommand(pendingData); pendingData = null; }
  };

  // ── canvas 渲染迴圈（每幀把 video 畫到 canvas，保留 alpha）──
  function startCanvasRender() {
    function render() {
      if (drawVideo.paused || drawVideo.ended) return;
      // 確保 canvas 尺寸跟影片一致
      if (drawCanvas.width !== drawVideo.videoWidth) {
        drawCanvas.width  = drawVideo.videoWidth;
        drawCanvas.height = drawVideo.videoHeight;
      }
      ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      ctx.drawImage(drawVideo, 0, 0);
      rafId = requestAnimationFrame(render);
    }
    rafId = requestAnimationFrame(render);
  }

  function stopCanvasRender() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  }

  function startDraw(data) {
    if (state !== 'idle') return;
    state = 'drawing';

    drawScreen.classList.add('show');
    drawVideo.currentTime = 0;

    const tryPlay = () => {
      // 設定 canvas 初始尺寸
      drawCanvas.width  = drawVideo.videoWidth  || 544;
      drawCanvas.height = drawVideo.videoHeight || 850;

      startCanvasRender();  // 開始 canvas 渲染

      const playPromise = drawVideo.play();
      let timer = setTimeout(endDraw, DRAW_DURATION_MS);

      if (playPromise !== undefined) {
        playPromise.catch(e => {
          console.warn('影片播放失敗，跳到結果:', e);
          stopCanvasRender();
          clearTimeout(timer);
          endDraw();
        });
      }

      drawVideo.addEventListener('ended', () => {
        clearTimeout(timer);
        endDraw();
      }, { once: true });
    };

    if (drawVideo.readyState >= 3) {
      tryPlay();
    } else {
      drawVideo.addEventListener('canplay', tryPlay, { once: true });
      drawVideo.load();
    }

    window._currentDrawData = data;
  }

  function endDraw() {
    stopCanvasRender();
    drawVideo.pause();
    drawScreen.classList.remove('show');
    showResult(window._currentDrawData);
  }

  function showResult(data) {
    if (!data) { resetToIdle(); return; }
    const { prizeName, winners } = data;

    document.getElementById('resultPrizeName').textContent = prizeName;
    document.getElementById('resultCount').textContent     = `共 ${winners.length} 位幸運得主`;

    const grid = document.getElementById('winnersGrid');
    grid.innerHTML = '';
    winners.forEach((w, i) => {
      const card = document.createElement('div');
      card.className = 'winner-card';
      card.style.animationDelay = (i * 0.1) + 's';
      card.innerHTML = `
        <div class="winner-index">第 ${i+1} 位</div>
        <div class="winner-name">${esc(w.realName)}</div>
        <div class="winner-unit">${esc(w.unitName)}</div>
      `;
      grid.appendChild(card);
    });

    const n = winners.length;
    const scale = n <= 8 ? 1 : n <= 15 ? 0.8 : n <= 25 ? 0.65 : n <= 40 ? 0.5 : 0.4;
    grid.style.setProperty('--card-scale', scale);

    resultScreen.classList.add('show');
    requestAnimationFrame(() => {
      const scrollEl = resultScreen.querySelector('.winners-scroll');
      if (scrollEl) scrollEl.scrollTop = 0;
    });
    launchConfetti();
    state = 'result';
  }

  function resetToIdle() {
    resultScreen.classList.remove('show');
    drawScreen.classList.remove('show');
    window._currentDrawData = null;
    state = 'idle';
  }

  function handleCommand(data) {
    if (data.status === 'start') {
      if (data.timestamp && data.timestamp === lastTimestamp) return;
      lastTimestamp = data.timestamp || Date.now();
      if (state === 'idle') startDraw(data);
    } else if (data.status === 'reset') {
      resetToIdle();
    }
  }

  onValue(ref(db, 'lottery_control'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    if (!unlocked) { pendingData = data; return; }
    handleCommand(data);
  });

  function launchConfetti() {
    const colors = ['#c0272d','#d4a843','#f0c96a','#fff','#ff6b6b','#ffd700'];
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left       = (Math.random() * 100) + 'vw';
        c.style.top        = '-10px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        const sz = (5 + Math.random() * 8) + 'px';
        c.style.width  = sz;
        c.style.height = sz;
        c.style.animationDuration = (3 + Math.random() * 4) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }, i * 35);
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
