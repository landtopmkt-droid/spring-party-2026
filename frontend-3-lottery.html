<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春酒活動 — 抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0272d;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --cream: #fdf6e3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Noto Serif TC', serif;
  }

  /* Draw video */
  #drawScreen {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #000;
    display: none;
  }
  #drawScreen.show { display: block; }
  #drawVideo { width: 100%; height: 100%; object-fit: cover; }

  /* Result screen */
  #resultScreen {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: linear-gradient(135deg, #1a0500, #0a0000, #1a0500);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow-y: auto;
    padding: 40px 20px;
  }
  #resultScreen.show {
    display: flex;
    animation: fadeInScale 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  .result-header { text-align: center; margin-bottom: 28px; }
  .result-prize-label { font-size: 1.5rem; color: rgba(212,168,67,0.55); letter-spacing: 0.45em; margin-bottom: 10px; }
  .result-prize-name { font-size: 4.5rem; font-weight: 900; color: var(--gold-light); letter-spacing: 0.15em; text-shadow: 0 0 40px rgba(212,168,67,0.45); line-height: 1.1; }
  .result-count { font-size: 1.65rem; color: rgba(212,168,67,0.45); letter-spacing: 0.3em; margin-top: 10px; }

  .result-divider { width: 220px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 0 auto 28px; }

  .winners-grid { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; max-width: 960px; width: 100%; }

  .winner-card {
    background: rgba(192,39,45,0.15);
    border: 1px solid rgba(212,168,67,0.28);
    border-radius: 6px;
    padding: 20px 26px;
    text-align: center;
    min-width: 150px;
    animation: cardReveal 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(28px) scale(0.82); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .winner-index { font-size: 1.08rem; color: rgba(212,168,67,0.38); letter-spacing: 0.2em; margin-bottom: 6px; }
  .winner-name { font-size: 2.175rem; font-weight: 700; color: var(--cream); letter-spacing: 0.08em; margin-bottom: 5px; }
  .winner-unit { font-size: 1.23rem; color: rgba(212,168,67,0.55); letter-spacing: 0.1em; font-family: 'Noto Sans TC', sans-serif; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 25;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── RWD ── */
  @media (max-width: 768px) {
    .result-prize-name { font-size: 2.1rem; }
    .result-count { font-size: 0.95rem; }
    .winners-grid { gap: 10px; padding: 0 8px; }
    .winner-card { padding: 14px 16px; min-width: 120px; }
    .winner-name { font-size: 1.15rem; }
    .winner-unit { font-size: 0.75rem; }
    .winner-index { font-size: 0.65rem; }
    .result-prize-label { font-size: 0.85rem; }
  }
  @media (max-width: 480px) {
    .result-prize-name { font-size: 1.7rem; }
    .winners-grid { gap: 8px; }
    .winner-card { min-width: 100px; padding: 12px 12px; }
    .winner-name { font-size: 1rem; }
    #resultScreen { padding: 24px 10px; }
  }

</style>
</head>
<body>

<div id="drawScreen">
  <video id="drawVideo" muted playsinline>
    <source src="lottery-draw.mp4" type="video/mp4">
  </video>
</div>

<div id="resultScreen">
  <div class="result-header">
    <div class="result-prize-label">✦ 恭喜得獎 ✦</div>
    <div class="result-prize-name" id="resultPrizeName"></div>
    <div class="result-count" id="resultCount"></div>
  </div>
  <div class="result-divider"></div>
  <div class="winners-grid" id="winnersGrid"></div>
</div>

<script>
  let state = 'idle';
  const drawScreen   = document.getElementById('drawScreen');
  const resultScreen = document.getElementById('resultScreen');
  const drawVideo    = document.getElementById('drawVideo');

  const DRAW_DURATION_MS = 6000;

  function startDraw() {
    if (state !== 'idle') return;
    state = 'drawing';
    drawScreen.classList.add('show');

    let timer = setTimeout(endDraw, DRAW_DURATION_MS);
    drawVideo.play().catch(() => {});
    drawVideo.addEventListener('ended', () => { clearTimeout(timer); endDraw(); }, { once: true });
  }

  function endDraw() {
    drawScreen.classList.remove('show');
    drawVideo.pause();
    drawVideo.currentTime = 0;
    showResult();
  }

  function showResult() {
    const data = JSON.parse(localStorage.getItem('springFest_lotteryResult') || 'null');
    if (!data) { resetToIdle(); return; }

    document.getElementById('resultPrizeName').textContent = data.prizeName;
    document.getElementById('resultCount').textContent = `共 ${data.winners.length} 位幸運得主`;

    const grid = document.getElementById('winnersGrid');
    grid.innerHTML = '';
    data.winners.forEach((w, i) => {
      const card = document.createElement('div');
      card.className = 'winner-card';
      card.style.animationDelay = (i * 0.1) + 's';
      card.innerHTML = `
        <div class="winner-index">第 ${i+1} 位</div>
        <div class="winner-name">${w.realName}</div>
        <div class="winner-unit">${w.unitName}</div>
      `;
      grid.appendChild(card);
    });

    resultScreen.classList.add('show');
    launchConfetti();
    state = 'result';
  }

  function resetToIdle() {
    resultScreen.classList.remove('show');
    drawScreen.classList.remove('show');
    state = 'idle';
  }

  function launchConfetti() {
    const colors = ['#c0272d','#d4a843','#f0c96a','#fff','#ff6b6b','#ffd700'];
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = (Math.random() * 100) + 'vw';
        c.style.top  = '-10px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        const sz = (5 + Math.random() * 8) + 'px';
        c.style.width  = sz;
        c.style.height = sz;
        c.style.animationDuration = (3 + Math.random() * 4) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }, i * 35);
    }
  }

  setInterval(() => {
    const ctrl = localStorage.getItem('springFest_lottery');
    if (ctrl === 'start' && state === 'idle') {
      startDraw();
      localStorage.setItem('springFest_lottery', 'drawing');
    } else if (ctrl === 'reset') {
      resetToIdle();
      localStorage.setItem('springFest_lottery', '');
    }
  }, 500);
</script>
</body>
</html>
